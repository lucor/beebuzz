# BeeBuzz web repo tooling

[tools]
node = "24.14"
pnpm = "10.31.0"

[env]
# Load local frontend env when present. Values below are safe defaults for development.
_.file = ".env"
VITE_BEEBUZZ_DOMAIN = "example.com"
VITE_BEEBUZZ_DEBUG = true
VITE_BEEBUZZ_DEPLOYMENT_MODE = "self_hosted"

[tasks.setup]
description = "Install frontend dependencies"
run = "pnpm install --frozen-lockfile"

[tasks.dev-site]
description = "Run SvelteKit site app with hot reload"
run = "pnpm -C apps/site dev"

[tasks.dev-hive]
description = "Run SvelteKit hive app with hot reload"
run = "pnpm -C apps/hive dev"

[tasks.check]
description = "Run Svelte checks for site and Hive"
run = [
  "pnpm -C apps/site run check",
  "pnpm -C apps/hive run check",
]

[tasks.lint]
description = "Run formatter check and ESLint"
run = "pnpm run lint"

[tasks.test]
description = "Run Vitest suite"
run = "pnpm run test"

[tasks.test-e2e]
description = "Run Playwright end-to-end tests"
run = "pnpm run test:e2e"

[tasks.build]
description = "Build site and Hive"
run = "pnpm run build"
