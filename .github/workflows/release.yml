name: Release

on:
  push:
    tags:
      - "beebuzz@*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Find previous beebuzz tag
        id: prev-tag
        run: |
          PREV=$(git tag --list 'beebuzz@*' --sort=-creatordate | sed -n '2p')
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          ARGS=(--generate-notes)
          if [ -n "$PREV_TAG" ]; then
            ARGS+=(--notes-start-tag "$PREV_TAG")
          fi
          gh release create "${{ github.ref_name }}" "${ARGS[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREV_TAG: ${{ steps.prev-tag.outputs.tag }}
