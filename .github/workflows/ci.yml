name: CI

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        id: filter
        run: |
          git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}
          changed=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }})
          server=false
          web=false
          while IFS= read -r file; do
            case "$file" in
              cmd/beebuzz/*) ;;
              cmd/*|internal/*|go.mod|go.sum|deploy/server.Dockerfile) server=true ;;
              web/*|deploy/Caddyfile|deploy/web.Dockerfile) web=true ;;
            esac
          done <<< "$changed"
          echo "server=$server" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"

  test-server:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true

      - name: Run govulncheck
        if: matrix.go-version == '1.26'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Run staticcheck
        if: matrix.go-version == '1.26'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          staticcheck ./...

      - name: Run Go tests
        run: go test ./...

  test-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.31.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: web/package.json
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Audit production dependencies
        run: pnpm audit --prod
        working-directory: web

      - name: Run web check
        run: pnpm run check
        working-directory: web

      - name: Run web lint
        run: pnpm run lint
        working-directory: web

      - name: Run web tests
        run: pnpm run test
        working-directory: web
