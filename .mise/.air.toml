# .air.toml - Air configuration for hot reload
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  entrypoint = "./bin/beebuzz-server"
  cmd = "go build -o ./bin/beebuzz-server ./cmd/beebuzz-server"
  delay = 1000
  exclude_dir = ["web", "bin", "tmp", "vendor", "data", "docs", "certs", "public"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "./bin/beebuzz-server serve"
  include_dir = ["cmd", "internal"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = true
  keep_scroll = true
