  /_stub/push/next:
    get:
      tags: [Push]
      operationId: getNextPushStubEvent
      summary: Long-poll the next captured push event (push-stub mode)
      description: |
        Returns the next push event captured by the push-stub broker.
        Intended for local development and automated test flows only.
        Rejects non-loopback clients.
      x-audience: [internal]
      x-stability: internal
      responses:
        "200":
          description: A captured push event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushStubEvent"
        "204":
          description: No event available within the long-poll timeout
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: beebuzz_session
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    TopicID:
      in: path
      name: topicID
      required: true
      schema:
        type: string
    DeviceID:
      in: path
      name: deviceID
      required: true
      schema:
        type: string
    TokenID:
      in: path
      name: tokenID
      required: true
      schema:
        type: string
    WebhookID:
      in: path
      name: webhookID
      required: true
      schema:
        type: string
    XPriority:
      in: header
      name: X-Priority
      required: false
      schema:
        type: string
        enum: [normal, high]
      description: |
        Push delivery priority. Relevant for `application/octet-stream`
        requests, where priority is passed via header instead of JSON body.
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    PayloadTooLarge:
      description: Payload too large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/ValidationErrorResponse"
              - $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
          minLength: 1
    ValidationErrorResponse:
      type: object
      required: [code, errors]
      properties:
        code:
          type: string
          enum: [validation_error]
        errors:
          type: array
          minItems: 1
          items:
            type: string
    HealthResponse:
      type: object
      required: [status, version, commit]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "2026.06.22.1"
        commit:
          type: string
          example: a1b2c3d
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    UserResponse:
      type: object
      required: [id, email, is_admin, account_status, created_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        is_admin:
          type: boolean
        account_status:
          type: string
          enum: [pending, active, blocked]
        trial_started_at:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required: [email, state]
      properties:
        email:
          type: string
          format: email
        state:
          type: string
        reason:
          type:
            - string
            - "null"
    VerifyOTPRequest:
      type: object
      required: [otp, state]
      properties:
        otp:
          type: string
        state:
          type: string
    TopicResponse:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 32
          pattern: "^[a-z][a-z0-9_]{0,31}$"
        description:
          type:
            - string
            - "null"
          maxLength: 128
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TopicsListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TopicResponse"
    CreateTopicRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 32
          pattern: "^[a-z][a-z0-9_]{0,31}$"
        description:
          type: string
          maxLength: 128
    UpdateTopicRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 128
    DeviceResponse:
      type: object
      required:
        [
          id,
          name,
          description,
          is_active,
          pairing_status,
          topic_ids,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        pairing_status:
          $ref: "#/components/schemas/PairingStatus"
        paired_at:
          type:
            - string
            - "null"
          format: date-time
        age_recipient:
          type:
            - string
            - "null"
        age_recipient_fingerprint:
          type:
            - string
            - "null"
        topic_ids:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DevicesListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DeviceResponse"
    DeviceKeyDescriptor:
      type: object
      required:
        [
          device_id,
          device_name,
          paired_at,
          age_recipient,
          age_recipient_fingerprint,
        ]
      properties:
        device_id:
          type: string
        device_name:
          type: string
        paired_at:
          type: string
          format: date-time
        age_recipient:
          type: string
          example: "age1..."
        age_recipient_fingerprint:
          type: string
          example: "a1b2c3d4"
    CreatedDeviceResponse:
      type: object
      required: [device, pairing_code, pairing_url, qr_code, expires_at]
      properties:
        device:
          $ref: "#/components/schemas/DeviceResponse"
        pairing_code:
          type: string
        pairing_url:
          type: string
        qr_code:
          type: string
        expires_at:
          type: string
          format: date-time
    PairingCodeResponse:
      type: object
      required: [pairing_code, pairing_url, qr_code, expires_at]
      properties:
        pairing_code:
          type: string
        pairing_url:
          type: string
        qr_code:
          type: string
        expires_at:
          type: string
          format: date-time
    CreateDeviceRequest:
      type: object
      required: [name, topics]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 128
        topics:
          type: array
          items:
            type: string
    UpdateDeviceRequest:
      type: object
      required: [name, topics]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 128
        topics:
          type: array
          items:
            type: string
    PairRequest:
      type: object
      required: [pairing_code, endpoint, p256dh, auth, age_recipient]
      properties:
        pairing_code:
          type: string
        endpoint:
          type: string
        p256dh:
          type: string
        auth:
          type: string
        age_recipient:
          type: string
    PairResponse:
      type: object
      required: [device_id, device_token]
      properties:
        device_id:
          type: string
        device_token:
          type: string
    PairingStatusResponse:
      type: object
      required: [device_id, pairing_status]
      properties:
        device_id:
          type: string
        pairing_status:
          $ref: "#/components/schemas/PairingStatus"
    PairingStatus:
      type: string
      enum: [pending, paired, unpaired, subscription_gone]
    DeviceNotificationSyncResponse:
      type: object
      required: [notifications, gap]
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/DeviceNotificationSyncItem"
        next_cursor:
          type: string
          nullable: true
        gap:
          type: boolean
          description: True when the requested cursor is older than the recovery window.
    DeviceNotificationSyncItem:
      type: object
      required: [id, delivery_mode, payload, sent_at, expires_at]
      properties:
        id:
          type: string
        delivery_mode:
          type: string
          enum: [server_trusted, e2e]
        payload:
          type: object
          description: Original push payload JSON. E2EE payloads are returned as the BeeBuzz attachment envelope.
          additionalProperties: true
        sent_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    APITokenResponse:
      type: object
      required: [id, name, last_four, created_at, is_active]
      properties:
        id:
          type: string
        name:
