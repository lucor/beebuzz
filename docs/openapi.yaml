    CreateWebhookRequestBeebuzz:
      type: object
      required: [name, payload_type, topics]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 128
        payload_type:
          type: string
          const: beebuzz
        title_path:
          type: string
          maxLength: 0
        body_path:
          type: string
          maxLength: 0
        priority:
          type: string
          enum: [normal, high]
          default: normal
        topics:
          type: array
          items:
            type: string
    CreateWebhookRequestCustom:
      type: object
      required: [name, payload_type, topics]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 128
        payload_type:
          type: string
          const: custom
        title_source:
          type: string
          enum: [path, static]
          default: path
          description: When "path", title_path is required and title must be extracted from the payload. When "static", title_value is required and used as the fixed notification title.
        title_path:
          type: string
          pattern: '^[A-Za-z0-9_]+(?:\[[0-9]+\])*(?:\.[A-Za-z0-9_]+(?:\[[0-9]+\])*)*$'
          description: Dot-separated JSON path with optional numeric array indexes. Required when title_source is "path".
        title_value:
          type: string
          maxLength: 64
          description: Fixed notification title. Required when title_source is "static".
        body_path:
          type: string
          pattern: '^(?:|[A-Za-z0-9_]+(?:\[[0-9]+\])*(?:\.[A-Za-z0-9_]+(?:\[[0-9]+\])*)*)$'
          description: Optional dot-separated JSON path with optional numeric array indexes. When omitted or empty, webhook notifications use an empty body.
        priority:
          type: string
          enum: [normal, high]
          default: normal
        topics:
          type: array
          items:
            type: string
    UpdateWebhookRequestBeebuzz:
