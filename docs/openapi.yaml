    DebugSnapshot:
      type: object
      additionalProperties: false
      required: [id, ts, scope, event, severity, message, context, related_logs]
      properties:
        id:
          type: string
          maxLength: 64
          description: Snapshot unique identifier.
        ts:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the snapshot was captured.
        scope:
          type: string
          enum:
            [
              app,
              push,
              payload,
              notification,
              service_worker,
              storage,
              pairing,
              network,
              encryption,
            ]
        event:
          type: string
          enum:
            [
              app.started,
              app.bootstrap_failed,
              service_worker.registered,
              service_worker.activated,
              service_worker.skip_waiting,
              pairing.reconnect_required,
              push.received,
              push.empty_payload,
              push.resolved,
              push.subscription_changed,
              payload.resolve,
              payload.detected_encrypted,
              payload.detected_plain,
              payload.decrypt_failed,
              payload.invalid,
              storage.credentials_failed,
              notification.persist_started,
              notification.persist_failed,
              notification.displayed,
              clients.match_failed,
              clients.focus_failed,
              clients.open_window_failed,
              clients.post_message_failed,
              debug_report.missing_device_token,
              debug_report.submit_failed,
            ]
        severity:
          type: string
          enum: [warn, error]
        message:
          type: string
          maxLength: 240
          description: Human-readable error message.
        error:
          $ref: "#/components/schemas/DebugError"
        context:
          $ref: "#/components/schemas/DebugContext"
        related_logs:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/DebugLog"

