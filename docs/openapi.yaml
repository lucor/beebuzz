openapi: 3.1.0
info:
  title: BeeBuzz API
  version: 0.9.0
  description: |
    BeeBuzz public API reference. Send push notifications, manage webhooks, and
    retrieve paired device public keys for end-to-end payload encryption.
servers:
  - url: /
tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Usage
  - name: Topics
  - name: Devices
  - name: Tokens
  - name: Push
  - name: Webhooks
  - name: Admin
  - name: Attachments
paths:
  /health:
    get:
      tags: [Health]
      operationId: checkHealth
      summary: Health check
      x-audience: [public]
      x-stability: stable
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/health:
    get:
      tags: [Health]
      operationId: checkApiHealth
      summary: API health check
      x-audience: [public]
      x-stability: stable
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/openapi.yaml:
    get:
      tags: [Health]
      operationId: getOpenAPIYAML
      summary: Get the OpenAPI document
      description: Returns the canonical OpenAPI contract published by this API server.
      x-audience: [public]
      x-stability: stable
      responses:
        "200":
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
  /v1/vapid-public-key:
    get:
      tags: [Push]
      operationId: getVapidPublicKey
      summary: Get the VAPID public key
      x-audience: [hive]
      x-stability: stable
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VAPIDPublicKeyResponse"
  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Start OTP login
      description: Supported client fields are documented here. The server may apply additional anti-abuse checks that are intentionally excluded from the public request contract.
      x-audience: [site]
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "204":
          description: OTP challenge accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          description: Too many auth attempts
          headers:
            Retry-After:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/auth/otp/verify:
    post:
      tags: [Auth]
      operationId: verifyOtp
      summary: Verify OTP and create a session
      x-audience: [site]
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOTPRequest"
      responses:
        "200":
          description: OTP verified
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Session and logged-in cookies are set on success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke the current session
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Session and logged-in cookies are cleared on success
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/me:
    get:
      tags: [User]
      operationId: getMe
      summary: Get current user profile
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/me/usage:
    get:
      tags: [Usage]
      operationId: getAccountUsage
      summary: Get account usage analytics
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            minimum: 0
            maximum: 90
          description: 0 means all time, otherwise 1 to 90
      responses:
        "200":
          description: Account usage data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountUsageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/topics:
    get:
      tags: [Topics]
      operationId: listTopics
      summary: List topics
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Topic list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Topics]
      operationId: createTopic
      summary: Create a topic
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTopicRequest"
      responses:
        "201":
          description: Topic created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/topics/{topicID}:
    patch:
      tags: [Topics]
      operationId: updateTopic
      summary: Update a topic
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TopicID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTopicRequest"
      responses:
        "204":
          description: Topic updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Topics]
      operationId: deleteTopic
      summary: Delete a topic
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TopicID"
      responses:
        "204":
          description: Topic deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/devices:
    get:
      tags: [Devices]
      operationId: listDevices
      summary: List devices
      description: Device responses expose topic IDs in the `topic_ids` array.
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevicesListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Devices]
      operationId: createDevice
      summary: Create a device and pairing code
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeviceRequest"
      responses:
        "201":
          description: Device created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedDeviceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/devices/{deviceID}:
    patch:
      tags: [Devices]
      operationId: updateDevice
      summary: Update a device
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeviceRequest"
      responses:
        "204":
          description: Device updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Devices]
      operationId: deleteDevice
      summary: Delete a device
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceID"
      responses:
        "204":
          description: Device deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/devices/{deviceID}/pairing-code:
    post:
      tags: [Devices]
      operationId: regeneratePairingCode
      summary: Regenerate a device pairing code
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceID"
      responses:
        "200":
          description: Pairing code regenerated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingCodeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/devices/{deviceID}/unpair:
    post:
      tags: [Devices]
      operationId: unpairDevice
      summary: Remove a device push subscription
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceID"
      responses:
        "204":
          description: Device unpaired
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/pairing:
    post:
      tags: [Devices]
      operationId: pairDevice
      summary: Pair a device with a push subscription
      x-audience: [hive]
      x-stability: stable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairRequest"
      responses:
        "200":
          description: Device paired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/pairing/{deviceID}:
    get:
      tags: [Devices]
      operationId: getPairingStatus
      summary: Get the pairing status for a paired device
      x-audience: [hive]
      x-stability: stable
      parameters:
        - in: path
          name: deviceID
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer device token returned by `POST /v1/pairing`
      responses:
        "200":
          description: Pairing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/devices/{deviceID}/notifications:
    get:
      tags: [Devices]
      operationId: syncDeviceNotifications
      summary: Sync recently missed notifications for a paired device
      x-audience: [hive]
      x-stability: beta
      description: |
        Returns unexpired notifications sent to this device within the short
        recovery window aligned with attachment availability.
      parameters:
        - in: path
          name: deviceID
          required: true
          schema:
            type: string
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Bearer device token returned by `POST /v1/pairing`
        - in: query
          name: after
          required: false
          schema:
            type: string
          description: Last notification UUIDv7 persisted by Hive.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Recently recoverable notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceNotificationSyncResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/tokens:
    get:
      tags: [Tokens]
      operationId: listApiTokens
      summary: List API tokens
      description: API token responses expose topic IDs in the `topic_ids` array.
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      responses:
        "200":
          description: API token list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITokensListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Tokens]
      operationId: createApiToken
      summary: Create an API token
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPITokenRequest"
      responses:
        "201":
          description: API token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedAPITokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/tokens/{tokenID}:
    patch:
      tags: [Tokens]
      operationId: updateApiToken
      summary: Update an API token
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAPITokenRequest"
      responses:
        "204":
          description: API token updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Tokens]
      operationId: revokeApiToken
      summary: Revoke an API token
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenID"
      responses:
        "204":
          description: API token revoked
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/push:
    post:
      tags: [Push]
      operationId: sendNotification
      summary: Send a notification
      x-audience: [public]
      x-stability: stable
      description: |
        <strong>Trusted path</strong> — send <code>application/json</code> or <code>multipart/form-data</code> with plaintext <code>title</code> and <code>body</code>. The server handles delivery to paired devices.

        <strong>E2EE path</strong> — retrieve device age public keys from <code>GET /v1/push/keys</code>, encrypt your payload client-side, then send as <code>application/octet-stream</code>. Use the <code>X-Priority</code> header to set priority.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XPriority"
      requestBody:
        required: true
        content:
          application/json:
            description: Trusted notification with plaintext title and body.
            schema:
              $ref: "#/components/schemas/SendRequest"
          multipart/form-data:
            description: Trusted notification with file attachment.
            schema:
              $ref: "#/components/schemas/SendMultipartRequest"
          application/octet-stream:
            description: |
              E2EE encrypted payload. Encrypt with age public keys from
              `GET /v1/push/keys` and send the raw ciphertext. Priority
              is set via the `X-Priority` header.
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Notification send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Validation or attachment processing error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
              examples:
                validation_error:
                  value:
                    code: validation_error
                    errors:
                      - title: is required
                attachment_processing_failed:
                  value:
                    code: attachment_processing_failed
                    message: Failed to process attachment
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          description: Push delivery failed for all devices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: push_delivery_failed
                message: Push delivery failed for all devices
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/push/{topic}:
    post:
      tags: [Push]
      operationId: sendNotificationToTopic
      summary: Send a notification to a topic
      x-audience: [public]
      x-stability: stable
      description: |
        <strong>Trusted path</strong> — send <code>application/json</code> or <code>multipart/form-data</code> with plaintext <code>title</code> and <code>body</code>. The server handles delivery to paired devices.

        <strong>E2EE path</strong> — retrieve device age public keys from <code>GET /v1/push/keys</code>, encrypt your payload client-side, then send as <code>application/octet-stream</code>. Use the <code>X-Priority</code> header to set priority.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: topic
          required: true
          schema:
            type: string
            maxLength: 32
            pattern: "^[a-z][a-z0-9_]{0,31}$"
        - $ref: "#/components/parameters/XPriority"
      requestBody:
        required: true
        content:
          application/json:
            description: Trusted notification with plaintext title and body.
            schema:
              $ref: "#/components/schemas/SendRequest"
          multipart/form-data:
            description: Trusted notification with file attachment.
            schema:
              $ref: "#/components/schemas/SendMultipartRequest"
          application/octet-stream:
            description: |
              E2EE encrypted payload. Encrypt with age public keys from
              `GET /v1/push/keys` and send the raw ciphertext. Priority
              is set via the `X-Priority` header.
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Notification send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Validation or attachment processing error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
              examples:
                validation_error:
                  value:
                    code: validation_error
                    errors:
                      - title: is required
                attachment_processing_failed:
                  value:
                    code: attachment_processing_failed
                    message: Failed to process attachment
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          description: Push delivery failed for all devices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: push_delivery_failed
                message: Push delivery failed for all devices
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/push/keys:
    get:
      tags: [Push]
      operationId: listDevicePublicKeys
      summary: List device public keys
      description: |
        Returns the age public keys for all paired devices. Use these keys to
        encrypt push payloads for E2EE delivery via <code>POST /v1/push</code> or
        <code>POST /v1/push/{topic}</code> (send as <code>application/octet-stream</code>).
      x-audience: [public]
      x-stability: stable
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Device keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeysResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/webhooks:
    get:
      tags: [Webhooks]
      operationId: listWebhooks
      summary: List webhooks
      description: Webhook responses expose topic IDs in the `topic_ids` array.
      x-audience: [site]
      x-stability: stable
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Webhook list
