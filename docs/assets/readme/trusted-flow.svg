<svg width="560" height="500" viewBox="0 0 560 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BeeBuzz server-trusted mode flow</title>
  <desc id="desc">A vertical flow showing an HTTP or webhook sender, BeeBuzz server, Web Push provider, and receiving device.</desc>
  <rect x="1" y="1" width="558" height="498" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>

  <circle cx="44" cy="48" r="7" fill="#c47f12"/>
  <text x="64" y="53" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" letter-spacing="1.8">SERVER-TRUSTED MODE</text>

  <line x1="54" y1="112" x2="54" y2="408" stroke="#e5e7eb" stroke-width="2"/>

  <g transform="translate(38 94)">
    <rect width="32" height="32" rx="8" fill="#fdf3e0" stroke="#f0c97a"/>
    <text x="16" y="21" text-anchor="middle" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700">IN</text>
    <text x="52" y="15" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" letter-spacing=".5">API sender</text>
    <text x="52" y="42" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Sends a notification from HTTP, webhook, CI,</text>
    <text x="52" y="64" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">monitoring, or another external service.</text>
    <rect x="52" y="82" width="135" height="24" rx="3" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="66" y="99" fill="#9ca3af" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing=".8">PLAINTEXT</text>
  </g>

  <g transform="translate(38 204)">
    <rect width="32" height="32" rx="8" fill="#fdf3e0" stroke="#f0c97a"/>
    <text x="16" y="21" text-anchor="middle" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700">BB</text>
    <text x="52" y="15" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" letter-spacing=".5">BeeBuzz server</text>
    <text x="52" y="42" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Validates the payload, handles short-lived</text>
    <text x="52" y="64" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">attachment data, and dispatches to devices.</text>
    <rect x="52" y="82" width="214" height="24" rx="3" fill="#fdf3e0" stroke="#f0c97a"/>
    <text x="66" y="99" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing=".8">VALIDATES · DISPATCHES</text>
  </g>

  <g transform="translate(38 314)">
    <rect width="32" height="32" rx="8" fill="#fdf3e0" stroke="#f0c97a"/>
    <text x="16" y="21" text-anchor="middle" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700">WP</text>
    <text x="52" y="15" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" letter-spacing=".5">Web Push provider</text>
    <text x="52" y="42" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Notification transport is encrypted in transit</text>
    <text x="52" y="64" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">between BeeBuzz and the browser.</text>
    <rect x="52" y="82" width="196" height="24" rx="3" fill="#fdf3e0" stroke="#f0c97a"/>
    <text x="66" y="99" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing=".8">VAPID · WEB PUSH</text>
  </g>

  <g transform="translate(38 424)">
    <rect width="32" height="32" rx="8" fill="#fdf3e0" stroke="#f0c97a"/>
    <text x="16" y="21" text-anchor="middle" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700">HV</text>
    <text x="52" y="15" fill="#92610a" font-family="IBM Plex Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="600" letter-spacing=".5">Hive device</text>
    <text x="52" y="42" fill="#6b7280" font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Receives and displays the notification.</text>
  </g>
</svg>
